allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
blockExoticSubdeps: true
enablePrePostScripts: false
ignorePatchFailures: false
optimisticRepeatInstall: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyclip@0.1.13
trustPolicyIgnoreAfter: 10080
verifyDepsBeforeRun: install
